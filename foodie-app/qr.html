<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLOREX — QR Code</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #FFF8F2 0%, #FDEBD0 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: #fff;
    border-radius: 28px;
    padding: 40px 48px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(245,124,32,0.15);
    max-width: 340px;
    width: 90%;
  }
  .logo {
    font-size: 42px;
    font-weight: 900;
    font-style: italic;
    color: #F57C20;
    letter-spacing: -2px;
    margin-bottom: 6px;
  }
  .sub {
    font-size: 13px;
    color: #9E9E9E;
    margin-bottom: 28px;
  }
  #qrcode {
    display: flex;
    justify-content: center;
    margin-bottom: 24px;
  }
  #qrcode canvas, #qrcode img {
    border-radius: 16px;
    border: 4px solid #FFF3E8;
  }
  .url-box {
    background: #FFF3E8;
    border-radius: 12px;
    padding: 10px 16px;
    font-size: 13px;
    color: #F57C20;
    font-weight: 700;
    word-break: break-all;
    margin-bottom: 16px;
  }
  .hint {
    font-size: 12px;
    color: #9E9E9E;
    line-height: 1.6;
  }
  .hint strong { color: #F57C20; }
  .dot {
    width: 8px; height: 8px;
    background: #4CAF50;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:0.5; transform:scale(0.8); }
  }
  .status { font-size: 12px; color: #4CAF50; font-weight: 600; margin-bottom: 20px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">GLOREX</div>
  <div class="sub">Food Delivery App</div>
  <div class="status"><span class="dot"></span>Server is running</div>
  <div id="qrcode"></div>
  <div class="url-box" id="urlText"></div>
  <div class="hint">
    📱 افتح كاميرا موبايلك<br>
    واسكن الباركود<br><br>
    <strong>تأكد إن موبايلك على نفس الـ Wi-Fi</strong>
  </div>
</div>
<script>
  const url = 'http://192.168.178.79:8080';
  document.getElementById('urlText').textContent = url;
  new QRCode(document.getElementById('qrcode'), {
    text: url,
    width: 220,
    height: 220,
    colorDark: '#F57C20',
    colorLight: '#FFFFFF',
    correctLevel: QRCode.CorrectLevel.H
  });
</script>
</body>
</html>
